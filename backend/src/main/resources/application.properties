# ===== BASE DE DATOS =====
spring.datasource.url=jdbc:postgresql://localhost:5432/productos_db
spring.datasource.username=postgres
spring.datasource.password=2020
spring.datasource.driver-class-name=org.postgresql.Driver

# ===== JPA / HIBERNATE =====
# create-drop: crea las tablas al iniciar y las elimina al cerrar (desarrollo)
# update: actualiza el esquema sin borrar datos (recomendado despues del primer run)
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# ===== SERVIDOR =====
server.port=8080

# ===== DATOS DE PRUEBA =====
spring.sql.init.mode=always
